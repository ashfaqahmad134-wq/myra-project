
name: Build MYRA Production APK
on: [push, workflow_dispatch]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Configure Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Grant Execute Permissions
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            gradlew_path=$(find . -name gradlew -print -quit)
            if [ ! -z "$gradlew_path" ]; then
              chmod +x "$gradlew_path"
              cd $(dirname "$gradlew_path")
            fi
          fi

      - name: Compile Ultimate Release APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Myra_Ultimate_AI_Build
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
